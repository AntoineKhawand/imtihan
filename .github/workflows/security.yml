name: Security Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sundays at 2 AM UTC
  workflow_dispatch:

jobs:
  # ── CodeQL static analysis (finds XSS, injection, logic bugs) ───────────────
  code-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript   # TypeScript is included in javascript analysis

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "imtihan-codeql"   # unique name — prevents duplicate-upload conflicts

  # ── npm dependency audit (finds CVEs in packages) ───────────────────────────
  dependency-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=high --json > audit-results.json || true

      - name: Report vulnerabilities
        run: |
          VULNS=$(jq '.vulnerabilities | length' audit-results.json 2>/dev/null || echo "0")
          echo "Dependency vulnerabilities found: $VULNS"
          [ "$VULNS" -gt 0 ] && echo "::warning::Run 'npm audit fix' to address dependency vulnerabilities."
        shell: bash

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: audit-results.json
          if-no-files-found: ignore
